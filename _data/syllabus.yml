intro_markdown: 'EECS 270 introduces you to the exciting world of digital logic design. Digital devices have proliferated in the last quarter century and have become essential in just about anything we do or depend on in a modern society. Computers of all varieties are now at the heart of commerce, communications, education, health care, entertainment, defense, etc. Personal computers have become standard fixtures in most homes and schools. But while the computer is the most visible digital computing device, it is by no means the only one. Embedded digital controllers can be found in such diverse applications as automobiles, airplanes, elevators, cellphones, televisions, cameras, and many kitchen appliances, to name just a tiny few.


  This course provides you with a basic understanding of what digital devices are, how they operate, and how they can be designed to perform useful functions. It forms the foundation for the more advanced hardware courses in our CS, CE, and EE curricula, notably EECS 373, 427, and 470. You will learn about digital design through a combination of lectures, labs, and projects. Through the projects, you will learn to apply the concepts learned in lecture to design real digital circuits using modern design tools and FPGAs.'
sections:
- id: attendance-policy
  title: Attendance Policy
  markdown: In-person attendance is **highly encouraged**. 
    If you must miss class for any reason, recordings of the lectures can be accessed through this link no later than a few hours after the lecture. Lectures cannot be attended remotely via Zoom.  
    
    **Lab sessions require attendance, and labs are graded**. 
  open: true
- id: course-topics
  title: Course Topics
  open: true
  bullet_items:
  - Bits Everywhere!
  - Switching Functions
  - Boolean Algebra
  - Positive Binary Numbers
  - Binary Arithmetic
  - Combinational Blocks
  - Latches and Flip-Flops
  - Timing and Delay
  - Sequential Circuit Analysis
  - Sequential Circuit Design
  - Two Level Logic Minimization
  - Sequential Building Blocks
  - Register Transfer Level (RTL) Design
  - Sequential Timing Analysis
  - Sequential Multiplication
  - Algorithmic Two-Level Logic Minimization
  - Designing Fast Adders
  - State Assignment and Minimization
- id: projects
  title: Projects
  markdown: 'You will complete **seven projects** through the semester. In these projects, you will design and implement various digital circuits for deployment on the DE2-115 FPGA development board.


    The projects increase in complexity as the semester progresses. The first four projects focus on combinational logic design, while the last three projects focus on sequential logic design. You will use Verilog as the hardware description language (HDL) for all projects.


    For further details on the projects, please refer to the [Projects Overview](https://umich.instructure.com/courses/815882/pages/projects-overview) page.'
- id: optional-textbooks
  title: Optional Textbooks
  bullet_items:
  - F. Vahid, Digital Design with RTL Design, VHDL, and Verilog, 2nd ed., Wiley.
  - 'J. F. Wakerly, Digital Design: Principles and Practices, 4th ed., Prentice-Hall.'
  - J. P. Hayes, Introduction to Digital Logic Design, Addison-Wesley.
  - C. H. Roth, Jr., Fundamentals of Logic Design.
  - R. H. Katz, Contemporary Logic Design, Prentice-Hall.
  - D. Thomas, P. Moorby, The Verilog Hardware Description Language.
