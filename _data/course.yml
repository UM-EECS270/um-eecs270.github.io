description: Introduction to digital logic design and computer organization. Topics
  include Boolean algebra, combinational and sequential logic design, finite state
  machines, computer arithmetic, assembly language programming, computer organization
  including processor design, memory systems, and I/O. Students gain hands-on experience
  with digital design tools and FPGA implementation.
